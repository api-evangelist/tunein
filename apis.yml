name: TuneIn
description: TuneIn is an internet radio and podcast platform providing REST and OPML-based APIs for accessing live radio stations, sports audio, news, podcasts, and searching audio content worldwide. The platform offers two primary API surfaces — the public OPML/RadioTime streaming API for browsing and tuning stations, and the AIR (Broadcaster) API for submitting real-time now-playing metadata.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/tunein/refs/heads/main/apis.yml
created: '2026-06-13'
modified: '2026-06-13'
specificationVersion: '0.19'
tags:
  - Radio
  - Internet Radio
  - Podcasts
  - Streaming Audio
  - Sports Audio
  - News Audio
  - Music
apis:
  - name: TuneIn Streaming API (OPML/RadioTime)
    description: The TuneIn Streaming API (backed by opml.radiotime.com) provides access to TuneIn's directory of internet radio stations, podcasts, sports audio, news, and music. Callers can browse categories, search for stations, describe specific stations or shows, and retrieve stream URLs for playback. Responses are available in OPML (XML) or JSON format.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://tunein-api.corehacked.com/
    baseURL: https://opml.radiotime.com
    tags:
      - Radio
      - Stations
      - Podcasts
      - Browse
      - Search
      - Streaming
    properties:
      - type: Documentation
        url: https://tunein-api.corehacked.com/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/tunein/refs/heads/main/openapi.yml
    contact:
      - FN: TuneIn Support
        url: https://help.tunein.com/
        email: ''
    overlays: []
    aid: tunein:tunein-streaming-api

  - name: TuneIn AIR (Broadcaster) API
    description: The TuneIn AIR (Audio Information Reporting) API enables licensed broadcast partners to submit real-time now-playing metadata — including song title, artist, album, and commercial break flags — directly to TuneIn. Stations receive a partnerId and partnerKey upon contacting TuneIn to register their station.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://tunein.com/broadcasters/api/
    baseURL: http://air.radiotime.com
    tags:
      - Broadcasters
      - Now Playing
      - Metadata
      - Radio Stations
    properties:
      - type: Documentation
        url: https://tunein.com/broadcasters/api/
      - type: Documentation
        url: https://cms.tunein.com/broadcasters/api/instructions/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/tunein/refs/heads/main/openapi-air.yml
    contact:
      - FN: TuneIn Broadcaster Support
        url: https://tunein.com/broadcasters/api/
        email: tuneinonair@tunein.com
    overlays: []
    aid: tunein:tunein-air-broadcaster-api

  - name: TuneIn Platform API
    description: The TuneIn Platform API is a partner-facing REST API (OAuth 2.0) for embedding TuneIn's full audio service into third-party devices and ecosystems. It exposes endpoints for categories, user profiles, content libraries, media access, now-playing, favorites, search, recommendations, and reporting. Access requires a partner evaluation agreement and certification process.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://developer.tunein.com/cfp_login
    baseURL: https://developer.tunein.com
    tags:
      - Platform
      - Partner
      - OAuth
      - Smart Devices
      - Embedded
      - Recommendations
      - Favorites
    properties:
      - type: Documentation
        url: https://developer.tunein.com/cfp_login
    contact:
      - FN: TuneIn Partner Certification
        url: https://developer.tunein.com/cfp_login
        email: partner-cert@tunein.com
    overlays: []
    aid: tunein:tunein-platform-api

